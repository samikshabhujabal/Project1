{% extends 'base.html' %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="bb-glass bb-card ai-glow p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h3 class="mb-0 fw-bold">My Profile</h3>
            <div class="text-muted small">Update your account information</div>
          </div>
          <span class="badge" style="background: rgba(69,123,157,0.12); color: var(--bb-blue);">{{ request.user.role }}</span>
        </div>

        <div class="mb-3">
          <div class="text-muted small">Username</div>
          <div class="fw-semibold">{{ request.user.username }}</div>
        </div>

        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">First name</label>
              {{ form.first_name }}
            </div>
            <div class="col-md-6">
              <label class="form-label">Last name</label>
              {{ form.last_name }}
            </div>
            <div class="col-md-12">
              <label class="form-label">Email</label>
              {{ form.email }}
            </div>
          </div>
          <div class="d-grid mt-4">
            <button class="btn btn-gradient btn-lg" type="submit">Save Changes</button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
